<h2>你想为哪些页面添加图片素材？</h2>
<p class="subtitle">当前共 6 个页面，选择你最想优化的页面（可多选）</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="simple" onclick="toggleSelect(this)">
    <div class="letter">1</div>
    <div class="content">
      <h3>极简模式</h3>
      <p>扫描→清理主流程，目前有粒子背景 + Ant Design 图标</p>
      <div class="tags"><span class="tag">idle 状态</span><span class="tag">扫描动画</span><span class="tag">结果展示</span></div>
    </div>
  </div>
  <div class="option" data-choice="overview" onclick="toggleSelect(this)">
    <div class="letter">2</div>
    <div class="content">
      <h3>空间概览</h3>
      <p>饼图 + 统计卡片，目前数据驱动的展示没有图片</p>
      <div class="tags"><span class="tag">统计卡片</span><span class="tag">空状态</span></div>
    </div>
  </div>
  <div class="option" data-choice="clean" onclick="toggleSelect(this)">
    <div class="letter">3</div>
    <div class="content">
      <h3>逐项清理</h3>
      <p>表格 + 勾选清理，功能型页面</p>
      <div class="tags"><span class="tag">表格</span><span class="tag">空状态</span></div>
    </div>
  </div>
  <div class="option" data-choice="largefiles" onclick="toggleSelect(this)">
    <div class="letter">4</div>
    <div class="content">
      <h3>大文件分析</h3>
      <p>表格 + AI 分析弹窗</p>
      <div class="tags"><span class="tag">表格空状态</span><span class="tag">AI 分析展示</span></div>
    </div>
  </div>
  <div class="option" data-choice="ai" onclick="toggleSelect(this)">
    <div class="letter">5</div>
    <div class="content">
      <h3>AI 助手设置</h3>
      <p>配置表单 + 预设列表</p>
      <div class="tags"><span class="tag">配置页</span><span class="tag">品牌展示</span></div>
    </div>
  </div>
  <div class="option" data-choice="settings" onclick="toggleSelect(this)">
    <div class="letter">6</div>
    <div class="content">
      <h3>设置页</h3>
      <p>简单设置 + 操作日志</p>
      <div class="tags"><span class="tag">品牌感</span></div>
    </div>
  </div>
  <div class="option" data-choice="all" onclick="toggleSelect(this)">
    <div class="letter">✓</div>
    <div class="content">
      <h3>全部页面</h3>
      <p>统一规划所有页面的素材体系</p>
    </div>
  </div>
</div>
